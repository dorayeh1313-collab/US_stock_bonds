name: Daily Market Data Updater

on:
  schedule:
    # 每天 UTC 時間 22:30 (台北時間隔天早上 6:30) 執行。
    # 此時美股已收盤，能完整抓取前一天的股市與債市數據。
    - cron: '30 22 * * *'
  workflow_dispatch:
    # 允許在 GitHub 網頁上點擊按鈕手動觸發執行

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance python-dotenv supabase beautifulsoup4 requests

    - name: Run data collection and upload
      env:
        # 將 GitHub Secrets 帶入執行環境變數中
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: |
        python fetch_data.py
